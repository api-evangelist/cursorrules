aid: cursorrules
name: .cursorrules
description: >-
  .cursorrules is a project-level configuration file used by the Cursor AI code editor
  to define custom rules, coding conventions, and behavioral instructions that shape
  how the editor's AI assistant generates and edits code. The file is placed in the
  root of a repository and is read automatically by Cursor when the project is opened,
  giving teams a way to enforce architectural patterns, style guides, framework conventions,
  and tooling preferences across all AI-generated code. The format is intentionally
  flexible - rules are typically written in plain Markdown or natural language and
  may include sections describing project structure, technology stack, naming conventions,
  testing requirements, and out-of-scope behaviors. Cursor has since extended the
  concept with .cursor/rules/ directories of multiple scoped rule files, but the
  original .cursorrules file remains widely used and supported.
